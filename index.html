<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUCISOL</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      font-size:15px;
      background:#f4f4f4;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container{
      width:320px;
      background:#fff;
      padding:24px;
      border-radius:10px;
      text-align:center;
      box-shadow:0 8px 24px rgba(0,0,0,.08);
    }

    h1{
      margin:0 0 20px;
      font-size:22px;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    input,button{
      width:100%;
      padding:10px;
      font-size:15px;
      border-radius:6px;
      box-sizing:border-box;
    }

    input{
      border:1px solid #ccc;
    }

    button{
      border:none;
      background:#222;
      color:#fff;
      cursor:pointer;
    }

    #msg{
      min-height:22px;
      margin-top:14px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>LUCISOL</h1>

  <form id="form">
    <input type="text" id="nome" placeholder="Nome do produto" required>
    <input type="number" id="preco" placeholder="Preço" step="0.01" required>
    <button type="submit">Enviar</button>
  </form>

  <div id="msg"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzTDWDtCVWQiRgsHQhnFRo1dJK3-f262SOuX528UuKcli1lAP4M_lGZdJAT_b27XGWb3g/exec";

const form = document.getElementById("form");
const msg = document.getElementById("msg");

form.onsubmit = async (e) => {
  e.preventDefault();

  const dados = {
    nome: document.getElementById("nome").value,
    preco: document.getElementById("preco").value
  };

  msg.innerText = "Enviando...";

  try{
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(dados)
    });

    const r = await res.json();

    msg.innerText = r.success ? "Incluído ✔" : "Erro";
  }catch{
    msg.innerText = "Erro conexão";
  }
};
</script>

</body>
</html>
