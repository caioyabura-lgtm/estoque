<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUCISOL</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      font-size: 15px;
      background: #f4f4f4;
    }

    .container {
      width: 320px;
      padding: 24px;
      background: #ffffff;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 20px;
      font-size: 22px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      border-radius: 6px;
      box-sizing: border-box;
    }

    input {
      border: 1px solid #cccccc;
    }

    button {
      border: none;
      background: #222222;
      color: #ffffff;
      cursor: pointer;
    }

    #feedback {
      min-height: 22px;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>LUCISOL</h1>

    <form id="produtoForm">
      <input type="text" id="nome" placeholder="Nome do produto" required>
      <input type="number" id="preco" placeholder="Preço" step="0.01" required>
      <button type="submit">Enviar</button>
    </form>

    <div id="feedback"></div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxAUuvJrUDlEKhjhXoyIuiN6enqr3-94nlRe9TZRKb_Hu5QUa0rwNIEtJijGSSSKcbqCA/exec";

    const form = document.getElementById("produtoForm");
    const feedback = document.getElementById("feedback");
    const submitButton = form.querySelector("button");

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      const nome = document.getElementById("nome").value.trim();
      const preco = document.getElementById("preco").value.trim();

      if (!nome || !preco) {
        feedback.textContent = "Erro";
        return;
      }

      submitButton.disabled = true;
      feedback.textContent = "Enviando...";

      const payload = {
        nome: nome,
        preco: preco
      };

      try {
        await fetch(API_URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(payload)
        });

        feedback.textContent = "Enviado. Confira a planilha.";
        form.reset();

      } catch (error) {
        feedback.textContent = "Erro conexão";
      } finally {
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
