<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Estoque - GETAO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-label {
            display: block;
            padding: 12px;
            background: #f8f9fa;
            border: 2px dashed #e0e0e0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            color: #666;
        }

        .file-label:hover {
            background: #e9ecef;
            border-color: #667eea;
        }

        .image-preview {
            margin-top: 10px;
            max-width: 100%;
            max-height: 200px;
            display: none;
            border-radius: 8px;
            overflow: hidden;
        }

        .image-preview img {
            width: 100%;
            height: auto;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            display: none;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 Sistema de Estoque</h1>
        <div class="subtitle">Gerencie seus produtos facilmente</div>
        
        <form id="productForm">
            <div class="form-group">
                <label for="productName">Nome do Produto *</label>
                <input type="text" id="productName" name="productName" required placeholder="Ex: Notebook Dell XPS">
            </div>
            
            <div class="form-group">
                <label for="price">Preço *</label>
                <input type="number" id="price" name="price" step="0.01" required placeholder="Ex: 2999.99">
            </div>
            
            <div class="form-group">
                <label for="photo">Foto do Produto *</label>
                <div class="file-input-wrapper">
                    <input type="file" id="photo" name="photo" accept="image/*" required>
                    <div class="file-label" id="fileLabel">
                        📸 Clique ou arraste uma imagem
                    </div>
                </div>
                <div class="image-preview" id="imagePreview">
                    <img id="previewImg" alt="Preview">
                </div>
            </div>
            
            <button type="submit">Registrar Produto</button>
        </form>
        
        <div id="message" class="message"></div>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #666;">Registrando produto...</p>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxiCSDJ6AbTGwQnQFvqybzsSQ9OyNKoDPE-bFNNpsD2xeojXw6MzWA_ApruPzJ86hFzjQ/exec'; // Substitua pela URL do seu Apps Script após implantar
        
        document.getElementById('photo').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('imagePreview');
                    const previewImg = document.getElementById('previewImg');
                    previewImg.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(file);
                document.getElementById('fileLabel').textContent = '📸 ' + file.name;
            }
        });
        
        document.getElementById('productForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData();
            const productName = document.getElementById('productName').value;
            const price = document.getElementById('price').value;
            const photoFile = document.getElementById('photo').files[0];
            
            if (!productName || !price || !photoFile) {
                showMessage('Por favor, preencha todos os campos', 'error');
                return;
            }
            
            formData.append('productName', productName);
            formData.append('price', price);
            formData.append('photo', photoFile);
            
            showLoading(true);
            
            try {
                const response = await fetch(scriptURL, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('✅ Produto registrado com sucesso!', 'success');
                    document.getElementById('productForm').reset();
                    document.getElementById('imagePreview').style.display = 'none';
                    document.getElementById('fileLabel').textContent = '📸 Clique ou arraste uma imagem';
                } else {
                    showMessage('❌ Erro: ' + (result.error || 'Falha no registro'), 'error');
                }
            } catch (error) {
                showMessage('❌ Erro de conexão: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        });
        
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = 'message ' + type;
            
            setTimeout(() => {
                messageDiv.className = 'message';
                messageDiv.style.display = 'none';
            }, 5000);
        }
        
        function showLoading(show) {
            const loadingDiv = document.getElementById('loading');
            const form = document.getElementById('productForm');
            const submitBtn = form.querySelector('button');
            
            if (show) {
                loadingDiv.classList.add('active');
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.5';
            } else {
                loadingDiv.classList.remove('active');
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
